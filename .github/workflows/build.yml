name: Build Instance Images

on:
  push:
    branches:
    - main
    tags:
    - v*
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  prepare-matrix:
    name: Read instance version matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Build matrix from images/versions.json
      id: matrix
      run: |
        versions=$(jq -c '[.[].version]' images/versions.json)
        echo "versions=${versions}" >> "$GITHUB_OUTPUT"

  build-instance:
    name: MySQL ${{ matrix.version }} instance image
    needs: prepare-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare-matrix.outputs.versions) }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Log in to ${{ env.REGISTRY }}
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push instance image
      run: |
        repo="${{ env.REGISTRY }}/${{ github.repository_owner }}/cloudnative-mysql-instance"
        # GHCR repositories must be lowercase.
        repo="$(echo "$repo" | tr '[:upper:]' '[:lower:]')"
        # On tag pushes, publish release tags (<version>-<patch> + moving <version>).
        # Otherwise, publish a commit-pinned tag: <version>-<short-sha>.
        if [ "${{ github.ref_type }}" != "tag" ]; then
          export COMMIT_TAG="$(echo "${{ github.sha }}" | cut -c1-7)"
        fi
        CONTAINER_TOOL=docker \
          REGISTRY="$repo" \
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
          PUSH=1 \
          ./images/build.sh "${{ matrix.version }}"
